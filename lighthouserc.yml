ci:
  collect:
    staticDistDir: apps/web/dist
  assert:
    assertions:
      categories:performance:
        - error
        - minScore: 0.70
      categories:best-practices:
        - error
        - minScore: 0.90
      resource-summary:script:size:
        - warn
        - maxNumericValue: 2097152
      first-contentful-paint:
        - warn
        - maxNumericValue: 3000
